<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>EstiPay — AI Voice Platform for Restoration Companies</title>
  <meta name="description" content="EstiPay automates the entire restoration revenue cycle with specialized AI voice agents — negotiating with insurance carriers, scheduling field visits, and collecting payments. Built for restoration and remediation companies." />
  <meta name="keywords" content="restoration company software, insurance claim automation, AI voice agent, appointment scheduling automation, payment collection software, restoration AI, carrier negotiation automation" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://estipay.com/" />

  <!-- Open Graph (LinkedIn, Slack, Facebook) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="EstiPay" />
  <meta property="og:title" content="EstiPay — AI Voice Platform for Restoration Companies" />
  <meta property="og:description" content="Automate carrier negotiations, field scheduling, and payment collection with EstiPay's specialized AI voice agents. Built exclusively for restoration and remediation companies." />
  <meta property="og:url" content="https://estipay.com/" />
  <meta property="og:image" content="https://estipay.com/assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@EstiPay" />
  <meta name="twitter:title" content="EstiPay — AI Voice Platform for Restoration Companies" />
  <meta name="twitter:description" content="Automate carrier negotiations, field scheduling, and payment collection with EstiPay's specialized AI voice agents." />
  <meta name="twitter:image" content="https://estipay.com/assets/og-image.png" />

  <!-- Organization JSON-LD (global, appears on every page) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "EstiPay",
    "url": "https://estipay.com",
    "logo": "https://estipay.com/assets/logoF.png",
    "description": "EstiPay is a vertical-specialized AI Voice Platform built exclusively for restoration and remediation companies — automating carrier negotiations, field scheduling, and payment collection.",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "sales",
      "email": "founders@estipay.com",
      "url": "https://estipay.com/contact"
    },
    "sameAs": [],
    "knowsAbout": [
      "Insurance claim automation",
      "AI voice agents",
      "Restoration company software",
      "Payment collection automation",
      "Appointment scheduling automation"
    ]
  }
  </script>

  <!-- WebSite JSON-LD (enables Google Sitelinks Search) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "EstiPay",
    "url": "https://estipay.com",
    "description": "AI Voice Platform for Restoration Companies",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://estipay.com/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Fonts: Inter (industry-standard UI typeface) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Material Symbols Outlined (MD3 icon set) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
